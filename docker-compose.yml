services:
  # ── Databases voor AudioMuse-AI ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: audiomuse_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=audiomusedb
      - POSTGRES_USER=audiomuse
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    volumes:
      - audiomuse_pgdata:/var/lib/postgresql/data
    networks:
      - muziek_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audiomuse -d audiomusedb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: audiomuse_redis
    restart: unless-stopped
    volumes:
      - audiomuse_redis:/data
    networks:
      - muziek_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Muziekdashboard (lastfm-app + Tidarr + AudioMuse-AI) ─────────────────
  muziekdashboard:
    build: .
    container_name: muziekdashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9090:80"
    env_file:
      - .env
    environment:
      # Tidarr draait intern in dezelfde container op poort 8484
      - TIDARR_URL=http://localhost:8484
      # Plex-integratie voor Tidarr
      - PLEX_URL=${PLEX_URL}
      - PLEX_TOKEN=${PLEX_TOKEN}
      - PLEX_LIBRARY=${PLEX_LIBRARY_ID}
      # Web player externe URL (voor browser streaming via ZeroTier)
      - PLEX_URL_EXTERNAL=http://10.94.184.22:32400
      # Tidarr instellingen
      - ADMIN_PASSWORD=${TIDARR_API_KEY}
      # Tidal levert "high" tracks momenteel als 320kbps AAC in plaats van FLAC.
      # "max" is betrouwbaarder totdat tiddl dit upstream fixt (zie tidarr#749).
      - LOCK_QUALITY=high
      - ENABLE_HISTORY=true
      # Tiddl auth fix — nieuwe Tidal API keys (zie tidarr#749 / tiddl#333)
      - TIDDL_AUTH=${TIDDL_AUTH:-}
      # MediaSage AI providers (optioneel, kies er één)
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # AudioMuse-AI database verbindingen
      - DATABASE_URL=postgresql://audiomuse:${POSTGRES_PASSWORD:-changeme}@postgres:5432/audiomusedb
      - REDIS_URL=redis://redis:6379/0
      - MEDIASERVER_TYPE=${MEDIASERVER_TYPE:-plex}
      # AudioMuse-AI auth — vereist door supervisord (%(ENV_SECRET_KEY)s etc.)
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-32chars!!}
      - AUDIOMUSE_USER=${AUDIOMUSE_USER:-admin}
      - AUDIOMUSE_PASSWORD=${AUDIOMUSE_PASSWORD:-changeme}
      # TIJDELIJK: auth uitgeschakeld zodat de setup-wizard en Plex-verbinding
      # geconfigureerd kunnen worden. Zet terug op true na voltooien van setup.
      - AUTH_ENABLED=false
    volumes:
      - ./data:/data
      - ./data/tidarr/config:/shared
      - ./data/mediasage:/mediasage/data
      - ./data/audiomuse:/app/audiomuse/data
      - /Volumes/4tbdrive/Muziek:/music
    networks:
      - muziek_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost/',r=>r.statusCode===200?process.exit(0):process.exit(1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 3

networks:
  muziek_net:
    driver: bridge

volumes:
  audiomuse_pgdata:
  audiomuse_redis:

services:
  lastfm-app:
    build: .
    container_name: lastfm-app
    restart: unless-stopped
    ports:
      - "9090:80"
    env_file:
      - .env
    volumes:
      - ./data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - tidarr
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost/health',r=>r.statusCode===200?process.exit(0):process.exit(1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  tidarr:
    build:
      context: ./tidarr
      dockerfile: docker/Dockerfile
      target: production
    container_name: tidarr
    restart: unless-stopped
    ports:
      - "8484:8484"
    environment:
      # Tidarr credentials (invullen in .env)
      - ADMIN_PASSWORD=${TIDARR_API_KEY}
      # Plex-integratie — Tidarr triggert automatisch een library-scan na download
      - PLEX_URL=${PLEX_URL}
      - PLEX_TOKEN=${PLEX_TOKEN}
      - PLEX_LIBRARY=${PLEX_LIBRARY_ID}
      # Download-kwaliteit
      - LOCK_QUALITY=LOSSLESS
      - ENABLE_HISTORY=true
    volumes:
      - ./data/tidarr/config:/shared
      - ./data/tidarr/downloads:/music
      # Zet dit pad naar je eigen Plex muziekmap zodat Tidarr direct in de bibliotheek schrijft.
      # - /pad/naar/plex/muziek:/music
    extra_hosts:
      - "host.docker.internal:host-gateway"

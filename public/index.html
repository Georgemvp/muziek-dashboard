<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muziekontdekkingen</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #d51007;
  --plex: #e5a00d;
  --plex-bg: rgba(229,160,13,0.12);
  --new: #6c5ce7;
  --new-bg: rgba(108,92,231,0.12);
  --green: #00b894;
  --green-bg: rgba(0,184,148,0.1);
  --bg: #0e0e0e;
  --surface: #181818;
  --surface2: #222;
  --surface3: #2a2a2a;
  --border: #2c2c2c;
  --text: #efefef;
  --muted: #666;
  --muted2: #888;
  --radius: 10px;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f2f2f2; --surface: #fff; --surface2: #f7f7f7; --surface3: #eee;
    --border: #ddd; --text: #111; --muted: #999; --muted2: #777;
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.app { max-width: 1080px; margin: 0 auto; padding: 1.5rem 1rem 5rem; }

/* ── Header ── */
.site-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.lfm-logo { background: var(--red); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 5px; letter-spacing: 0.04em; flex-shrink: 0; }
.site-title { font-size: 17px; font-weight: 600; flex: 1; }
.plex-pill {
  font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
  display: flex; align-items: center; gap: 5px; flex-shrink: 0;
}
.plex-pill.on  { background: var(--plex-bg); color: var(--plex); }
.plex-pill.off { background: var(--surface2); color: var(--muted2); }
.plex-dot { width: 6px; height: 6px; border-radius: 50%; }
.plex-pill.on  .plex-dot { background: var(--plex); }
.plex-pill.off .plex-dot { background: var(--muted); }

/* ── Plex now playing ── */
.plex-np {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--plex);
  border-radius: var(--radius); padding: 10px 14px; margin-bottom: 10px;
}
.plex-np-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--plex); flex-shrink: 0; animation: blink 1.2s ease-in-out infinite; }
.plex-np-label { font-size: 11px; color: var(--plex); font-weight: 700; flex-shrink: 0; letter-spacing: 0.04em; }

/* ── User card ── */
.user-card { display: flex; align-items: center; gap: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 1.5rem; }
.user-avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
.user-avatar-ph { width: 52px; height: 52px; border-radius: 50%; background: var(--red); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: #fff; flex-shrink: 0; }
.user-name { font-size: 16px; font-weight: 600; }
.user-sub { font-size: 13px; color: var(--muted2); margin-top: 2px; }

/* ── Tabs ── */
.tabs { display: flex; gap: 5px; margin-bottom: 1rem; flex-wrap: wrap; }
.tab {
  padding: 7px 14px; font-size: 13px; font-weight: 500;
  border: 1px solid var(--border); border-radius: 7px;
  cursor: pointer; background: var(--surface); color: var(--muted2);
  transition: all 0.15s; user-select: none;
}
.tab:hover { color: var(--text); border-color: var(--muted2); }
.tab.active { background: var(--red); color: #fff; border-color: var(--red); }
.tab-badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 16px; padding: 0 5px;
  background: var(--new); color: #fff; border-radius: 9px;
  font-size: 10px; font-weight: 700; margin-left: 4px;
}
.tab.active .tab-badge { background: rgba(255,255,255,0.3); }

/* ── Sub-toolbar ── */
.toolbar { display: none; gap: 4px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
.toolbar.visible { display: flex; }
.tool-btn {
  padding: 4px 12px; font-size: 12px; border: 1px solid var(--border); border-radius: 5px;
  cursor: pointer; background: transparent; color: var(--muted2); transition: all 0.15s;
}
.tool-btn:hover { color: var(--text); }
.tool-btn.sel-def  { color: var(--text);   border-color: var(--text);   font-weight: 500; }
.tool-btn.sel-new  { color: var(--new);    border-color: var(--new);    font-weight: 500; background: var(--new-bg); }
.tool-btn.sel-plex { color: var(--plex);   border-color: var(--plex);   font-weight: 500; background: var(--plex-bg); }
.tool-btn.sel-miss { color: var(--new);    border-color: var(--new);    font-weight: 500; background: var(--new-bg); }
.toolbar-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
.refresh-btn { margin-left: auto; }

/* ── Section title ── */
.section-title { font-size: 11px; font-weight: 600; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }

/* ── Tags ── */
.tags { display: flex; gap: 4px; flex-wrap: wrap; }
.tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; background: var(--surface3); color: var(--muted2); letter-spacing: 0.02em; }

/* ── Badges ── */
.badge { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; }
.badge.plex { background: var(--plex-bg); color: var(--plex); }
.badge.new  { background: var(--new-bg);  color: var(--new);  }
.badge.own  { background: var(--green-bg); color: var(--green); }

/* ── Card list (recent/loved) ── */
.card-list { display: flex; flex-direction: column; gap: 6px; }
.card { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; transition: border-color 0.15s; }
.card:hover { border-color: var(--muted2); }
.card-img { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
.card-ph { width: 44px; height: 44px; border-radius: 6px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--muted); flex-shrink: 0; }
.card-info { flex: 1; min-width: 0; }
.card-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-sub { font-size: 13px; color: var(--muted2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.card-bar { height: 2px; background: var(--border); border-radius: 2px; margin-top: 6px; }
.card-bar-fill { height: 2px; background: var(--red); border-radius: 2px; }
.card-meta { font-size: 12px; color: var(--muted2); flex-shrink: 0; text-align: right; }
.now-playing { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--red); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 6px; }
.np-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; animation: blink 1.2s ease-in-out infinite; }
.np-label { font-size: 11px; color: var(--red); font-weight: 700; flex-shrink: 0; letter-spacing: 0.04em; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ── Artist grid ── */
.artist-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.ag-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color 0.15s, transform 0.15s; }
.ag-card:hover { border-color: var(--muted2); transform: translateY(-2px); }
.ag-photo { width: 100%; aspect-ratio: 1/1; overflow: hidden; background: var(--surface2); }
.ag-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
.ag-photo-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; color: var(--muted); }
.ag-info { padding: 10px 12px 12px; }
.ag-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.ag-plays { font-size: 11px; color: var(--muted2); margin-top: 4px; }

/* ── Recs grid ── */
.rec-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
.rec-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color 0.15s; }
.rec-card:hover { border-color: var(--muted2); }
.rec-card.hidden { display: none; }
.rec-photo { width: 100%; aspect-ratio: 16/9; overflow: hidden; background: var(--surface2); }
.rec-photo img { width: 100%; height: 100%; object-fit: cover; object-position: top center; display: block; }
.rec-photo-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 800; color: var(--muted); }
.rec-body { padding: 12px 14px 14px; }
.rec-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
.rec-title-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; flex: 1; }
.rec-name { font-size: 15px; font-weight: 600; }
.rec-match { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 5px; background: rgba(213,16,7,0.15); color: var(--red); flex-shrink: 0; }
.rec-reason { font-size: 12px; color: var(--muted2); margin-bottom: 8px; }
.rec-tags { margin-bottom: 10px; }
.rec-albums-label { font-size: 10px; font-weight: 700; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
.rec-albums-list { display: flex; flex-direction: column; gap: 5px; }
.rec-album-row { display: flex; align-items: center; gap: 8px; }
.rec-album-img { width: 32px; height: 32px; border-radius: 4px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
.rec-album-ph { width: 32px; height: 32px; border-radius: 4px; background: var(--surface2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--muted); }
.rec-album-name { font-size: 12px; opacity: 0.85; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.rec-album-plex { font-size: 10px; color: var(--plex); font-weight: 600; flex-shrink: 0; }
.rec-loading { font-size: 12px; color: var(--muted2); }

/* ── Discover ── */
.discover-section { margin-bottom: 2.5rem; }
.discover-artist-card {
  display: flex; align-items: flex-start; gap: 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
}
.discover-photo {
  width: 72px; height: 72px; border-radius: 50%; object-fit: cover;
  flex-shrink: 0; background: var(--surface2);
}
.discover-photo-ph {
  width: 72px; height: 72px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 800; color: var(--muted); flex-shrink: 0;
}
.discover-info { flex: 1; min-width: 0; }
.discover-name { font-size: 19px; font-weight: 700; margin-bottom: 3px; line-height: 1.2; }
.discover-meta { font-size: 12px; color: var(--muted2); margin-bottom: 6px; }
.discover-reason { font-size: 12px; color: var(--muted2); margin-top: 6px; }
.discover-missing { font-size: 12px; color: var(--new); font-weight: 600; margin-top: 4px; }
.discover-match { font-size: 13px; font-weight: 700; padding: 5px 12px; border-radius: 6px; background: rgba(213,16,7,0.12); color: var(--red); flex-shrink: 0; align-self: flex-start; white-space: nowrap; }

/* ── Album grid ── */
.album-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.album-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: transform 0.15s, border-color 0.15s; }
.album-card:hover { transform: translateY(-2px); border-color: var(--muted2); }
.album-card.owned { opacity: 0.4; }
.album-card.owned:hover { opacity: 0.75; }
.album-cover { position: relative; aspect-ratio: 1/1; overflow: hidden; }
.album-cover img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.3s; }
.album-cover-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; color: var(--muted); position: absolute; top: 0; left: 0; }
.album-info { padding: 8px 10px 10px; }
.album-title {
  font-size: 12px; font-weight: 600; line-height: 1.3; margin-bottom: 2px;
  overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.album-year { font-size: 11px; color: var(--muted2); margin-bottom: 4px; }
.album-status { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }
.album-status.miss { background: var(--new-bg);   color: var(--new);  }
.album-status.own  { background: var(--plex-bg);  color: var(--plex); }

/* ── Gaps ── */
.gaps-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 16px 20px; margin-bottom: 1.5rem; }
.gaps-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
.gaps-photo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
.gaps-photo-ph { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; color: var(--muted); flex-shrink: 0; }
.gaps-artist-name { font-size: 17px; font-weight: 700; margin-bottom: 2px; }
.gaps-artist-meta { font-size: 12px; color: var(--muted2); margin-bottom: 8px; }
.comp-bar { height: 4px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
.comp-fill { height: 100%; background: var(--plex); border-radius: 3px; }
.comp-text { font-size: 11px; color: var(--muted2); }
.gaps-sub { font-size: 10px; font-weight: 700; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }
.gaps-album-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }

/* ── Loading / Error / Empty ── */
.loading { text-align: center; padding: 3.5rem 1rem; color: var(--muted2); font-size: 14px; }
.spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.build-hint { font-size: 12px; color: var(--muted); margin-top: 8px; }
.error-box { background: rgba(213,16,7,0.08); border: 1px solid rgba(213,16,7,0.25); color: #f07070; border-radius: var(--radius); padding: 14px 16px; font-size: 14px; }
.empty { text-align: center; padding: 3rem 1rem; color: var(--muted2); font-size: 14px; }

/* ── Responsive ── */
@media (max-width: 800px) {
  .artist-grid  { grid-template-columns: repeat(2, 1fr); }
  .album-grid   { grid-template-columns: repeat(3, 1fr); }
  .gaps-album-grid { grid-template-columns: repeat(3, 1fr); }
  .rec-grid     { grid-template-columns: 1fr; }
}
@media (max-width: 560px) {
  .app { padding: 1rem 0.75rem 4rem; }
  .album-grid   { grid-template-columns: repeat(2, 1fr); }
  .gaps-album-grid { grid-template-columns: repeat(2, 1fr); }
  .discover-artist-card { flex-wrap: wrap; }
}
</style>
</head>
<body>
<div class="app">

  <div class="site-header">
    <span class="lfm-logo">LAST.FM</span>
    <span class="site-title">Muziekontdekkingen</span>
    <span class="plex-pill off" id="plex-pill">
      <span class="plex-dot"></span>
      <span id="plex-pill-text">Plex…</span>
    </span>
  </div>

  <div id="plex-np-wrap"></div>
  <div id="user-wrap"></div>

  <div class="tabs" id="tabs">
    <button class="tab" data-tab="discover">Ontdek <span class="tab-badge" id="badge-discover">✦</span></button>
    <button class="tab" data-tab="gaps">Collectiegaten <span class="tab-badge" id="badge-gaps">?</span></button>
    <button class="tab active" data-tab="recent">Recent</button>
    <button class="tab" data-tab="recs">Aanbevelingen</button>
    <button class="tab" data-tab="topartists">Top artiesten</button>
    <button class="tab" data-tab="toptracks">Top nummers</button>
    <button class="tab" data-tab="loved">♥ Geliefd</button>
  </div>

  <!-- Period toolbar -->
  <div class="toolbar" id="tb-period">
    <button class="tool-btn sel-def" data-period="7day">Week</button>
    <button class="tool-btn" data-period="1month">Maand</button>
    <button class="tool-btn" data-period="3month">3 maanden</button>
    <button class="tool-btn" data-period="12month">Jaar</button>
    <button class="tool-btn" data-period="overall">Alles</button>
  </div>

  <!-- Recs filter toolbar -->
  <div class="toolbar" id="tb-recs">
    <button class="tool-btn sel-def" data-filter="all">Alle</button>
    <button class="tool-btn" data-filter="new">✦ Nieuw voor mij</button>
    <button class="tool-btn" data-filter="plex">▶ Al in Plex</button>
  </div>

  <!-- Discover filter toolbar -->
  <div class="toolbar" id="tb-discover">
    <button class="tool-btn sel-def" data-dfilter="all">Alle artiesten</button>
    <button class="tool-btn" data-dfilter="new">✦ Nieuw voor mij</button>
    <button class="tool-btn" data-dfilter="partial">▶ Gedeeltelijk in Plex</button>
    <span class="toolbar-sep"></span>
    <button class="tool-btn refresh-btn" id="btn-refresh-discover">↻ Vernieuwen</button>
  </div>

  <!-- Gaps filter toolbar -->
  <div class="toolbar" id="tb-gaps">
    <button class="tool-btn sel-def" data-gsort="missing">Meest ontbrekend</button>
    <button class="tool-btn" data-gsort="name">A–Z</button>
    <span class="toolbar-sep"></span>
    <button class="tool-btn refresh-btn" id="btn-refresh-gaps">↻ Vernieuwen</button>
  </div>

  <div id="content">
    <div class="loading"><div class="spinner"></div>Laden...</div>
  </div>

</div>
<script>
// ── State ─────────────────────────────────────────────────────────────────
let currentTab    = 'recent';
let currentPeriod = '7day';
let recsFilter    = 'all';
let discFilter    = 'all';
let gapsSort      = 'missing';
let plexOk        = false;
let lastDiscover  = null;
let lastGaps      = null;

// ── Helpers ───────────────────────────────────────────────────────────────
const getImg = (imgs, size = 'medium') => {
  if (!imgs) return null;
  const i = imgs.find(x => x.size === size);
  return (i && i['#text'] && !i['#text'].includes('2a96cbd8b46e442fc41c2b86b821562f')) ? i['#text'] : null;
};
const initials = n => n.split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
const fmt  = n => parseInt(n).toLocaleString('nl-NL');
const esc  = s => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const periodLabel = p => ({ '7day':'week','1month':'maand','3month':'3 maanden','12month':'jaar','overall':'alles' }[p] || p);

function timeAgo(ts) {
  const s = Math.floor(Date.now()/1000) - ts;
  if (s < 120)   return 'zojuist';
  if (s < 3600)  return `${Math.floor(s/60)}m`;
  if (s < 86400) return `${Math.floor(s/3600)}u`;
  return `${Math.floor(s/86400)}d`;
}

function gradientFor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffffff;
  const hue = h % 360;
  return `linear-gradient(135deg,hsl(${hue},45%,20%),hsl(${(hue+45)%360},55%,14%))`;
}

function countryFlag(code) {
  if (!code || code.length !== 2) return '';
  return [...code.toUpperCase()].map(c => String.fromCodePoint(c.charCodeAt(0) + 127397)).join('');
}

function tagsHtml(tags, max = 4) {
  if (!tags?.length) return '';
  return `<div class="tags" style="margin-top:5px">${tags.slice(0, max).map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>`;
}

function plexBadge(inPlex) {
  if (!plexOk) return '';
  return inPlex
    ? `<span class="badge plex">▶ In Plex</span>`
    : `<span class="badge new">✦ Nieuw</span>`;
}

async function apiFetch(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Serverfout ${res.status}`);
  return res.json();
}
const setContent  = html => { document.getElementById('content').innerHTML = html; };
const showLoading = msg  => setContent(`<div class="loading"><div class="spinner"></div>${msg || 'Laden...'}</div>`);
const showError   = msg  => setContent(`<div class="error-box">⚠️ ${esc(msg)}</div>`);
const trackImg    = imgs => {
  const src = getImg(imgs);
  return src ? `<img class="card-img" src="${src}" alt="" loading="lazy">` : `<div class="card-ph">♪</div>`;
};

// ── Album card ─────────────────────────────────────────────────────────────
function albumCard(album, showBadge = true, small = false) {
  const owned = album.inPlex;
  const bg = gradientFor(album.title || '');
  const year = album.year || '—';
  const grid = small ? 'gaps-album-grid' : '';
  return `
    <div class="album-card ${owned ? 'owned' : 'missing'}" title="${esc(album.title)}${year !== '—' ? ' ('+year+')' : ''}">
      <div class="album-cover" style="background:${bg}">
        <div class="album-cover-ph">${initials(album.title || '?')}</div>
        <img src="${esc(album.coverUrl || '')}" alt="" loading="lazy"
          style="opacity:0;transition:opacity 0.35s;position:relative;z-index:1"
          onload="this.style.opacity='1'" onerror="this.remove()">
      </div>
      <div class="album-info">
        <div class="album-title">${esc(album.title)}</div>
        <div class="album-year">${year}</div>
        ${showBadge ? `<span class="album-status ${owned ? 'own' : 'miss'}">${owned ? '▶ In Plex' : '✦ Ontbreekt'}</span>` : ''}
      </div>
    </div>`;
}

// ── Plex status ────────────────────────────────────────────────────────────
async function loadPlexStatus() {
  try {
    const d = await fetch('/api/plex/status').then(r => r.json());
    const pill = document.getElementById('plex-pill');
    const text = document.getElementById('plex-pill-text');
    if (d.connected) {
      plexOk = true;
      pill.className = 'plex-pill on';
      text.textContent = `Plex · ${fmt(d.artists)} artiesten`;
    } else {
      pill.className = 'plex-pill off';
      text.textContent = 'Plex offline';
    }
  } catch (e) { document.getElementById('plex-pill-text').textContent = 'Plex offline'; }
}

async function loadPlexNP() {
  const wrap = document.getElementById('plex-np-wrap');
  try {
    const d = await fetch('/api/plex/nowplaying').then(r => r.json());
    wrap.innerHTML = d.playing
      ? `<div class="plex-np"><div class="plex-np-dot"></div><span class="plex-np-label">PLEX NU</span>
           <div class="card-info"><div class="card-title">${esc(d.track)}</div>
           <div class="card-sub">${esc(d.artist)}${d.album ? ' · '+esc(d.album) : ''}</div></div></div>`
      : '';
  } catch (e) { wrap.innerHTML = ''; }
}

// ── Recent ─────────────────────────────────────────────────────────────────
async function loadRecent() {
  showLoading(); loadPlexNP();
  try {
    const d = await apiFetch('/api/recent');
    const tracks = d.recenttracks?.track || [];
    if (!tracks.length) { setContent('<div class="empty">Geen recente nummers.</div>'); return; }
    let html = '<div class="card-list">';
    for (const t of tracks) {
      const isNow = t['@attr']?.nowplaying;
      const when  = t.date?.uts ? timeAgo(parseInt(t.date.uts)) : '';
      const art   = t.artist?.['#text'] || '';
      const artwork = trackImg(t.image);
      if (isNow) {
        html += `<div class="now-playing">${artwork}<div class="np-dot"></div><span class="np-label">NU</span>
          <div class="card-info"><div class="card-title">${esc(t.name)}</div><div class="card-sub">${esc(art)}</div></div></div>`;
      } else {
        html += `<div class="card">${artwork}<div class="card-info">
          <div class="card-title">${esc(t.name)}</div><div class="card-sub">${esc(art)}</div>
          </div><div class="card-meta">${when}</div></div>`;
      }
    }
    setContent(html + '</div>');
  } catch (e) { showError(e.message); }
}

// ── Top artiesten ──────────────────────────────────────────────────────────
async function loadTopArtists(period) {
  showLoading();
  try {
    const d = await apiFetch(`/api/topartists?period=${period}`);
    const artists = d.topartists?.artist || [];
    if (!artists.length) { setContent('<div class="empty">Geen data.</div>'); return; }
    const max = parseInt(artists[0]?.playcount || 1);
    let html = `<div class="section-title">Top artiesten · ${periodLabel(period)}</div><div class="artist-grid">`;
    for (let i = 0; i < artists.length; i++) {
      const a = artists[i];
      const pct = Math.round(parseInt(a.playcount) / max * 100);
      const lfmImg = getImg(a.image, 'large') || getImg(a.image);
      const photoHtml = lfmImg
        ? `<img src="${lfmImg}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          + `<div class="ag-photo-ph" style="display:none;background:${gradientFor(a.name)}">${initials(a.name)}</div>`
        : `<div class="ag-photo-ph" style="background:${gradientFor(a.name)}">${initials(a.name)}</div>`;
      html += `<div class="ag-card"><div class="ag-photo" id="agp-${i}">${photoHtml}</div>
        <div class="ag-info"><div class="ag-name">${esc(a.name)}</div>
        <div class="card-bar"><div class="card-bar-fill" style="width:${pct}%"></div></div>
        <div class="ag-plays">${fmt(a.playcount)} plays</div></div></div>`;
    }
    setContent(html + '</div>');
    artists.forEach(async (a, i) => {
      try {
        const info = await apiFetch(`/api/artist/${encodeURIComponent(a.name)}/info`);
        if (info.image) {
          const el = document.getElementById(`agp-${i}`);
          if (el) el.innerHTML = `<img src="${info.image}" alt="" loading="lazy" onerror="this.style.display='none'">`;
        }
      } catch (e) {}
    });
  } catch (e) { showError(e.message); }
}

// ── Top nummers ────────────────────────────────────────────────────────────
async function loadTopTracks(period) {
  showLoading();
  try {
    const d = await apiFetch(`/api/toptracks?period=${period}`);
    const tracks = d.toptracks?.track || [];
    if (!tracks.length) { setContent('<div class="empty">Geen data.</div>'); return; }
    const max = parseInt(tracks[0]?.playcount || 1);
    let html = `<div class="section-title">Top nummers · ${periodLabel(period)}</div><div class="card-list">`;
    for (const t of tracks) {
      const pct = Math.round(parseInt(t.playcount) / max * 100);
      html += `<div class="card">${trackImg(t.image)}<div class="card-info">
        <div class="card-title">${esc(t.name)}</div><div class="card-sub">${esc(t.artist?.name || '')}</div>
        <div class="card-bar"><div class="card-bar-fill" style="width:${pct}%"></div></div>
        </div><div class="card-meta">${fmt(t.playcount)}×</div></div>`;
    }
    setContent(html + '</div>');
  } catch (e) { showError(e.message); }
}

// ── Aanbevelingen (snelle versie + Plex + MBZ tags) ───────────────────────
async function loadRecs() {
  showLoading();
  try {
    const d = await apiFetch('/api/recs');
    const recs = d.recommendations || [];
    plexOk = d.plexConnected || plexOk;
    if (d.plexConnected && d.plexArtistCount) {
      document.getElementById('plex-pill').className = 'plex-pill on';
      document.getElementById('plex-pill-text').textContent = `Plex · ${fmt(d.plexArtistCount)} artiesten`;
    }
    if (!recs.length) { setContent('<div class="empty">Geen aanbevelingen gevonden.</div>'); return; }

    const newC  = recs.filter(r => !r.inPlex).length;
    const plexC = recs.filter(r =>  r.inPlex).length;
    let html = `<div class="section-title">Gebaseerd op jouw smaak: ${(d.basedOn||[]).slice(0,3).join(', ')}
      ${plexOk ? ` &nbsp;·&nbsp; <span style="color:var(--new)">${newC} nieuw</span> · <span style="color:var(--plex)">${plexC} in Plex</span>` : ''}
      </div><div class="rec-grid">`;

    for (let i = 0; i < recs.length; i++) {
      const r = recs[i];
      const pct = Math.round(r.match * 100);
      html += `
        <div class="rec-card" data-inplex="${r.inPlex}" id="rc-${i}">
          <div class="rec-photo" id="rph-${i}">
            <div class="rec-photo-ph" style="background:${gradientFor(r.name)}">${initials(r.name)}</div>
          </div>
          <div class="rec-body">
            <div class="rec-header">
              <div class="rec-title-row"><span class="rec-name">${esc(r.name)}</span>${plexBadge(r.inPlex)}</div>
              <span class="rec-match">${pct}%</span>
            </div>
            <div class="rec-reason">Vergelijkbaar met ${esc(r.reason)}</div>
            <div id="rtags-${i}"></div>
            <div id="ralb-${i}"><div class="rec-loading">Albums laden…</div></div>
          </div>
        </div>`;
    }
    setContent(html + '</div>');
    applyRecsFilter();

    recs.forEach(async (r, i) => {
      try {
        const info = await apiFetch(`/api/artist/${encodeURIComponent(r.name)}/info`);

        const ph = document.getElementById(`rph-${i}`);
        if (ph && info.image) ph.innerHTML = `<img src="${info.image}" alt="" loading="lazy"
          onerror="this.parentElement.innerHTML='<div class=\\'rec-photo-ph\\' style=\\'background:${gradientFor(r.name)}\\'>${initials(r.name)}</div>'">`;

        const tagsEl = document.getElementById(`rtags-${i}`);
        if (tagsEl) tagsEl.innerHTML = tagsHtml(info.tags, 3) + `<div style="height:6px"></div>`;

        const albEl = document.getElementById(`ralb-${i}`);
        if (albEl) {
          const albums = (info.albums || []).slice(0, 4);
          if (albums.length) {
            let ah = '<div class="rec-albums-label">Bekende albums</div><div class="rec-albums-list">';
            for (const a of albums) {
              const imgEl = a.image
                ? `<img class="rec-album-img" src="${a.image}" alt="" loading="lazy">`
                : `<div class="rec-album-ph">♪</div>`;
              const plexMark = plexOk && a.inPlex ? `<span class="rec-album-plex">▶</span>` : '';
              ah += `<div class="rec-album-row">${imgEl}<span class="rec-album-name">${esc(a.name)}</span>${plexMark}</div>`;
            }
            albEl.innerHTML = ah + '</div>';
          } else { albEl.innerHTML = ''; }
        }
      } catch (e) {
        const albEl = document.getElementById(`ralb-${i}`);
        if (albEl) albEl.innerHTML = '';
      }
    });
  } catch (e) { showError(e.message); }
}

function applyRecsFilter() {
  document.querySelectorAll('.rec-card[data-inplex]').forEach(card => {
    const inPlex = card.dataset.inplex === 'true';
    let show = true;
    if (recsFilter === 'new')  show = !inPlex;
    if (recsFilter === 'plex') show = inPlex;
    card.classList.toggle('hidden', !show);
  });
}

// ── Discover (deep: MBZ + album grid) ─────────────────────────────────────
async function loadDiscover() {
  showLoading('Ontdekkingen ophalen...');
  try {
    const d = await apiFetch('/api/discover');
    if (d.status === 'building') {
      setContent(`<div class="loading"><div class="spinner"></div>
        <div>${esc(d.message)}</div>
        <div class="build-hint">Pagina ververst automatisch over 20 seconden</div></div>`);
      setTimeout(() => { if (currentTab === 'discover') loadDiscover(); }, 20_000);
      return;
    }
    lastDiscover = d;
    if (d.plexConnected) { plexOk = true; }
    renderDiscover();
  } catch (e) { showError(e.message); }
}

function renderDiscover() {
  if (!lastDiscover) return;
  const { artists, basedOn } = lastDiscover;
  if (!artists?.length) { setContent('<div class="empty">Geen ontdekkingen gevonden.</div>'); return; }

  let filtered = artists;
  if (discFilter === 'new')     filtered = artists.filter(a => !a.inPlex);
  if (discFilter === 'partial') filtered = artists.filter(a => a.inPlex && a.missingCount > 0);

  if (!filtered.length) { setContent('<div class="empty">Geen artiesten voor dit filter.</div>'); return; }

  const totalMissing = filtered.reduce((s, a) => s + a.missingCount, 0);
  let html = `<div class="section-title">Gebaseerd op: ${(basedOn||[]).slice(0,3).join(', ')}
    &nbsp;·&nbsp; <span style="color:var(--new)">${totalMissing} albums te ontdekken</span></div>`;

  for (const a of filtered) {
    const matchPct = Math.round(a.match * 100);
    const meta = [
      countryFlag(a.country),
      a.country,
      a.startYear ? `Actief vanaf ${a.startYear}` : null,
      a.totalAlbums ? `${a.totalAlbums} studio-albums` : null
    ].filter(Boolean).join(' · ');

    const photo = a.image
      ? `<img class="discover-photo" src="${esc(a.image)}" alt="" loading="lazy"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <div class="discover-photo-ph" style="display:none;background:${gradientFor(a.name)}">${initials(a.name)}</div>`
      : `<div class="discover-photo-ph" style="background:${gradientFor(a.name)}">${initials(a.name)}</div>`;

    html += `
      <div class="discover-section">
        <div class="discover-artist-card">
          ${photo}
          <div class="discover-info">
            <div class="discover-name">${esc(a.name)} ${plexBadge(a.inPlex)}</div>
            <div class="discover-meta">${esc(meta)}</div>
            ${tagsHtml(a.tags, 5)}
            <div class="discover-reason" style="margin-top:6px">Vergelijkbaar met <strong>${esc(a.reason)}</strong></div>
            ${a.missingCount > 0
              ? `<div class="discover-missing">✦ ${a.missingCount} ${a.missingCount === 1 ? 'album' : 'albums'} te ontdekken</div>`
              : `<div style="font-size:12px;color:var(--plex);margin-top:4px">▶ Volledig in Plex</div>`}
          </div>
          <span class="discover-match">${matchPct}%</span>
        </div>`;

    if (a.albums?.length) {
      html += `<div class="album-grid">`;
      for (const alb of a.albums) html += albumCard(alb, true);
      html += `</div>`;
    } else {
      html += `<div style="font-size:13px;color:var(--muted2);padding:8px 0">Albums nog niet beschikbaar. Vernieuw straks.</div>`;
    }
    html += `</div>`;
  }

  setContent(html);
}

// ── Collection Gaps ────────────────────────────────────────────────────────
async function loadGaps() {
  showLoading('Collectiegaten zoeken...');
  try {
    const d = await apiFetch('/api/gaps');
    if (d.status === 'building') {
      setContent(`<div class="loading"><div class="spinner"></div>
        <div>${esc(d.message)}</div>
        <div class="build-hint">Pagina ververst automatisch over 20 seconden</div></div>`);
      setTimeout(() => { if (currentTab === 'gaps') loadGaps(); }, 20_000);
      return;
    }
    lastGaps = d;
    renderGaps();
  } catch (e) { showError(e.message); }
}

function renderGaps() {
  if (!lastGaps) return;
  let artists = [...(lastGaps.artists || [])];
  if (!artists.length) {
    setContent('<div class="empty">Geen collectiegaten gevonden — je hebt alles al! 🎉</div>');
    // Update badge
    document.getElementById('badge-gaps').textContent = '0';
    return;
  }

  if (gapsSort === 'missing') artists.sort((a, b) => b.missingAlbums.length - a.missingAlbums.length);
  if (gapsSort === 'name')    artists.sort((a, b) => a.name.localeCompare(b.name));

  const totalMissing = artists.reduce((s, a) => s + a.missingAlbums.length, 0);
  document.getElementById('badge-gaps').textContent = totalMissing;

  let html = `<div class="section-title">${totalMissing} ontbrekende albums bij ${artists.length} artiesten die je al hebt</div>`;

  for (const a of artists) {
    const pct = Math.round(a.ownedCount / a.totalCount * 100);
    const meta = [countryFlag(a.country), a.country, a.startYear].filter(Boolean).join(' · ');
    const photo = a.image
      ? `<img class="gaps-photo" src="${esc(a.image)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <div class="gaps-photo-ph" style="display:none;background:${gradientFor(a.name)}">${initials(a.name)}</div>`
      : `<div class="gaps-photo-ph" style="background:${gradientFor(a.name)}">${initials(a.name)}</div>`;

    html += `
      <div class="gaps-block">
        <div class="gaps-header">
          ${photo}
          <div style="flex:1;min-width:0">
            <div class="gaps-artist-name">${esc(a.name)}</div>
            <div class="gaps-artist-meta">${esc(meta)}</div>
            ${tagsHtml(a.tags, 3)}
            <div style="height:8px"></div>
            <div class="comp-bar"><div class="comp-fill" style="width:${pct}%"></div></div>
            <div class="comp-text">${a.ownedCount} van ${a.totalCount} albums in Plex
              &nbsp;·&nbsp; <span style="color:var(--new);font-weight:600">${a.missingAlbums.length} ontbreken</span></div>
          </div>
        </div>
        <div class="gaps-sub">Ontbrekende albums</div>
        <div class="gaps-album-grid">`;

    for (const alb of a.missingAlbums) html += albumCard(alb, false);
    html += `</div>`;

    // Show owned albums collapsed
    if (a.allAlbums?.filter(x => x.inPlex).length > 0) {
      html += `<details style="margin-top:12px">
        <summary style="font-size:11px;color:var(--muted2);cursor:pointer;user-select:none">
          ▸ ${a.ownedCount} albums die je al hebt
        </summary>
        <div class="gaps-album-grid" style="margin-top:10px">
          ${a.allAlbums.filter(x => x.inPlex).map(alb => albumCard(alb, false)).join('')}
        </div>
      </details>`;
    }

    html += `</div>`;
  }
  setContent(html);
}

// ── Geliefd ────────────────────────────────────────────────────────────────
async function loadLoved() {
  showLoading();
  try {
    const d = await apiFetch('/api/loved');
    const tracks = d.lovedtracks?.track || [];
    if (!tracks.length) { setContent('<div class="empty">Geen geliefde nummers.</div>'); return; }
    let html = '<div class="section-title">Geliefde nummers</div><div class="card-list">';
    for (const t of tracks) {
      const when = t.date?.uts ? timeAgo(parseInt(t.date.uts)) : '';
      html += `<div class="card">${trackImg(t.image)}<div class="card-info">
        <div class="card-title">${esc(t.name)}</div><div class="card-sub">${esc(t.artist?.name||'')}</div>
        </div><div class="card-meta" style="color:var(--red)">♥ ${when}</div></div>`;
    }
    setContent(html + '</div>');
  } catch (e) { showError(e.message); }
}

// ── Navigatie ──────────────────────────────────────────────────────────────
const tabLoaders = {
  discover:   () => loadDiscover(),
  gaps:       () => loadGaps(),
  recent:     () => loadRecent(),
  recs:       () => loadRecs(),
  topartists: () => loadTopArtists(currentPeriod),
  toptracks:  () => loadTopTracks(currentPeriod),
  loved:      () => loadLoved()
};

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    document.getElementById('tb-period').classList.toggle('visible', ['topartists','toptracks'].includes(currentTab));
    document.getElementById('tb-recs').classList.toggle('visible', currentTab === 'recs');
    document.getElementById('tb-discover').classList.toggle('visible', currentTab === 'discover');
    document.getElementById('tb-gaps').classList.toggle('visible', currentTab === 'gaps');
    tabLoaders[currentTab]?.();
  });
});

document.querySelectorAll('[data-period]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-period]').forEach(b => b.classList.remove('sel-def'));
    btn.classList.add('sel-def');
    currentPeriod = btn.dataset.period;
    tabLoaders[currentTab]?.();
  });
});

document.querySelectorAll('[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('sel-def','sel-new','sel-plex'));
    recsFilter = btn.dataset.filter;
    btn.classList.add(recsFilter === 'all' ? 'sel-def' : recsFilter === 'new' ? 'sel-new' : 'sel-plex');
    applyRecsFilter();
  });
});

document.querySelectorAll('[data-dfilter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-dfilter]').forEach(b => b.classList.remove('sel-def','sel-new','sel-miss'));
    discFilter = btn.dataset.dfilter;
    btn.classList.add(discFilter === 'all' ? 'sel-def' : discFilter === 'new' ? 'sel-new' : 'sel-miss');
    renderDiscover();
  });
});

document.querySelectorAll('[data-gsort]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-gsort]').forEach(b => b.classList.remove('sel-def'));
    btn.classList.add('sel-def');
    gapsSort = btn.dataset.gsort;
    renderGaps();
  });
});

document.getElementById('btn-refresh-discover').addEventListener('click', async () => {
  lastDiscover = null;
  await fetch('/api/discover/refresh', { method: 'POST' });
  loadDiscover();
});

document.getElementById('btn-refresh-gaps').addEventListener('click', async () => {
  lastGaps = null;
  await fetch('/api/gaps/refresh', { method: 'POST' });
  loadGaps();
});

// ── Gebruikersprofiel ──────────────────────────────────────────────────────
async function loadUser() {
  try {
    const d = await apiFetch('/api/user');
    const u = d.user;
    const src = getImg(u.image, 'large');
    const av = src
      ? `<img class="user-avatar" src="${src}" alt="">`
      : `<div class="user-avatar-ph">${(u.name||'U')[0].toUpperCase()}</div>`;
    const year = new Date(parseInt(u.registered?.unixtime) * 1000).getFullYear();
    document.getElementById('user-wrap').innerHTML = `
      <div class="user-card">${av}
        <div><div class="user-name">${esc(u.realname || u.name)}</div>
        <div class="user-sub">${fmt(u.playcount)} scrobbles · lid sinds ${year}</div></div>
      </div>`;
  } catch (e) {}
}

// ── Init ───────────────────────────────────────────────────────────────────
loadPlexStatus();
loadPlexNP();
loadUser();
loadRecent();
setInterval(loadPlexNP, 30_000);
</script>

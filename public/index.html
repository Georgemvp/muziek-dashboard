<!DOCTYPE html>
<html lang="nl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muziekontdekkingen</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
</head>
<body>
<div class="app">

  <div class="site-header">
    <span class="lfm-logo">LAST.FM</span>
    <span class="site-title">Muziekontdekkingen</span>
    <span class="plex-pill off" id="plex-pill">
      <span class="plex-dot"></span>
      <span id="plex-pill-text">Plex…</span>
      <button class="plex-refresh-btn" id="plex-refresh-btn" title="Bibliotheek synchroniseren">↻</button>
    </span>
    <button class="theme-toggle" id="theme-toggle" title="Wissel thema">☀️</button>
    <label class="quality-selector" title="Download kwaliteit">
      <span class="quality-label">⬇ Kwaliteit</span>
      <select id="download-quality">
        <option value="max">Max (24-bit Hi-Res)</option>
        <option value="high">High (lossless FLAC)</option>
        <option value="normal">Normal (AAC)</option>
        <option value="low">Low (96kbps)</option>
      </select>
    </label>
  </div>

  <div id="plex-np-wrap"></div>
  <div id="user-wrap"></div>

  <!-- Zoekbalk -->
  <div class="search-wrap" id="search-wrap">
    <input class="search-input" id="search-input" type="text" placeholder="🔍  Zoek een artiest..." autocomplete="off">
    <div class="search-results" id="search-results"></div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="nu">🎵 Nu</button>
    <button class="tab" data-tab="ontdek">✦ Ontdek <span class="tab-badge" id="badge-releases" style="display:none">0</span></button>
    <button class="tab" data-tab="gaps">🔍 Gaps <span class="tab-badge" id="badge-gaps">?</span></button>
    <button class="tab" data-tab="bibliotheek">📀 Bibliotheek</button>
    <button class="tab" data-tab="downloads">⬇ Downloads <span class="tab-badge" id="badge-tidarr-queue" style="display:none">0</span></button>
  </div>
  <!-- Verborgen badge-houders voor backward-compat met bestaande JS -->
  <span id="badge-wishlist" style="display:none">0</span>
  <span id="badge-discover" style="display:none">✦</span>

  <!-- Period toolbar -->
  <div class="toolbar" id="tb-period">
    <button class="tool-btn sel-def" data-period="7day">Week</button>
    <button class="tool-btn" data-period="1month">Maand</button>
    <button class="tool-btn" data-period="3month">3 maanden</button>
    <button class="tool-btn" data-period="12month">Jaar</button>
    <button class="tool-btn" data-period="overall">Alles</button>
  </div>

  <!-- Recs filter toolbar -->
  <div class="toolbar" id="tb-recs">
    <button class="tool-btn sel-def" data-filter="all">Alle</button>
    <button class="tool-btn" data-filter="new">✦ Nieuw voor mij</button>
    <button class="tool-btn" data-filter="plex">▶ Al in Plex</button>
  </div>

  <!-- Spotify mood toolbar (verborgen als Spotify niet geconfigureerd is) -->
  <div class="toolbar" id="tb-mood" style="display:none">
    <span class="toolbar-label spotify-label">🎯 Spotify mood</span>
    <span class="toolbar-sep"></span>
    <button class="tool-btn mood-btn" data-mood="energiek">⚡ Energiek</button>
    <button class="tool-btn mood-btn" data-mood="chill">🌊 Chill</button>
    <button class="tool-btn mood-btn" data-mood="melancholisch">🌧 Melancholisch</button>
    <button class="tool-btn mood-btn" data-mood="experimenteel">🔬 Experimenteel</button>
    <button class="tool-btn mood-btn" data-mood="feest">🎉 Feest</button>
    <span class="toolbar-sep" id="mood-sep-clear" style="display:none"></span>
    <button class="tool-btn" id="btn-clear-mood" style="display:none">✕ Wis mood</button>
  </div>

  <!-- Discover filter toolbar -->
  <div class="toolbar" id="tb-discover">
    <button class="tool-btn sel-def" data-dfilter="all">Alle artiesten</button>
    <button class="tool-btn" data-dfilter="new">✦ Nieuw voor mij</button>
    <button class="tool-btn" data-dfilter="partial">▶ Gedeeltelijk in Plex</button>
    <span class="toolbar-sep"></span>
    <button class="tool-btn refresh-btn" id="btn-refresh-discover">↻ Vernieuwen</button>
  </div>

  <!-- Releases filter toolbar -->
  <div class="toolbar" id="tb-releases">
    <button class="tool-btn sel-def" data-rtype="all">Alle</button>
    <button class="tool-btn" data-rtype="album">Albums</button>
    <button class="tool-btn" data-rtype="single">Singles</button>
    <button class="tool-btn" data-rtype="ep">EP's</button>
    <span class="toolbar-sep"></span>
    <button class="tool-btn sel-def" data-rsort="listening">Op luistergedrag</button>
    <button class="tool-btn" data-rsort="date">Op datum</button>
    <span class="toolbar-sep"></span>
    <button class="tool-btn refresh-btn" id="btn-refresh-releases">↻ Vernieuwen</button>
  </div>

  <!-- Plex bibliotheek toolbar -->
  <div class="toolbar" id="tb-plexlib">
    <input class="plib-search" id="plib-search" type="text" placeholder="🔍  Zoek artiest of album…" autocomplete="off">
    <button class="tool-btn refresh-btn" id="btn-sync-plex">↻ Sync Plex</button>
  </div>

  <!-- Tidal (Tidarr) toolbar -->
  <div class="toolbar" id="tb-tidal">
    <input class="tidal-search" id="tidal-search" type="text" placeholder="🔍  Zoek op Tidal (album of nummer)…" autocomplete="off">
    <span class="toolbar-sep"></span>
    <button class="tool-btn sel-def" data-tidal-view="search">Zoeken</button>
    <button class="tool-btn" data-tidal-view="queue">Queue <span class="tab-badge" id="badge-tidarr-queue-inline" style="display:none">0</span></button>
    <button class="tool-btn" data-tidal-view="history">📥 Gedownload</button>
    <span class="toolbar-sep"></span>
    <span class="toolbar-sep"></span>
    <button class="tool-btn" data-tidal-view="tidarr">🎛️ Tidarr UI</button>
    <span class="toolbar-sep"></span>
    <span class="tidarr-status-pill off" id="tidarr-status-pill">
      <span class="tidarr-dot"></span>
      <span id="tidarr-status-text">Tidarr…</span>
    </span>
  </div>

  <!-- Tidarr UI toolbar -->
  <div class="toolbar" id="tb-tidarr-ui">
    <span class="toolbar-label">Tidarr — volledige interface</span>
    <span class="toolbar-sep"></span>
    <button class="tool-btn" id="btn-tidarr-reload" title="Herlaad Tidarr">↻ Herladen</button>
    <a class="tool-btn" id="btn-tidarr-open" href="/tidarr-ui/" target="_blank" title="Open in nieuw venster">↗ Nieuw venster</a>
  </div>

  <!-- Tidarr iframe container (buiten #content, wordt getoond/verborgen als tab) -->
  <div id="tidarr-ui-wrap" style="display:none; flex:1; overflow:hidden; min-height:0;">
    <iframe
      id="tidarr-iframe"
      src=""
      data-src="/tidarr-ui/"
      style="width:100%; height:100%; border:none; min-height:600px; border-radius:0 0 10px 10px;"
      allow="autoplay"
      title="Tidarr">
    </iframe>
  </div>

  <!-- Gaps filter toolbar -->
  <div class="toolbar" id="tb-gaps">
    <button class="tool-btn sel-def" data-gsort="missing">Meest ontbrekend</button>
    <button class="tool-btn" data-gsort="name">A–Z</button>
    <span class="toolbar-sep"></span>
    <button class="tool-btn refresh-btn" id="btn-refresh-gaps">↻ Vernieuwen</button>
  </div>

  <div id="content">
    <div class="loading"><div class="spinner"></div>Laden...</div>
  </div>

  <!-- Mobiele bottom navigation bar (5 hoofdtabs) -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="bnav-btn active" data-tab="nu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>Nu</span>
    </button>
    <button class="bnav-btn" data-tab="ontdek">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
      <span>Ontdek</span>
    </button>
    <button class="bnav-btn" data-tab="gaps">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <span>Gaps</span>
    </button>
    <button class="bnav-btn" data-tab="bibliotheek">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      <span>Bibliotheek</span>
    </button>
    <button class="bnav-btn" data-tab="downloads">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span>Downloads</span>
    </button>
  </nav>

</div>

<!-- Queue FAB + popover -->
<button id="queue-fab" style="display:none" title="Download queue">
  <span class="fab-icon">⬇</span>
  <span class="fab-badge" id="fab-queue-badge" style="display:none">0</span>
</button>
<div id="queue-popover" class="queue-popover">
  <div class="qpop-header">
    <span class="qpop-title-main">📥 Download queue</span>
    <button id="qpop-close" class="qpop-close">✕</button>
  </div>
  <div id="queue-popover-list" class="qpop-list"></div>
  <div class="qpop-footer">
    <button id="qpop-goto-tidal" class="qpop-goto">Alles bekijken in Tidal tab →</button>
  </div>
</div>

<!-- Artiest detail panel -->
<div class="panel-overlay" id="panel-overlay">
  <div class="artist-panel" id="artist-panel">
    <button class="panel-close" id="panel-close">✕</button>
    <div id="panel-content">
      <div class="loading"><div class="spinner"></div>Laden...</div>
    </div>
  </div>
</div>

<!-- Download bevestigingsdialog -->
<div id="dl-confirm-modal" class="dl-confirm-overlay">
  <div class="dl-confirm-box">
    <div class="dl-confirm-header">
      <div class="dl-confirm-title">Verkeerde artiest gevonden</div>
      <div class="dl-confirm-sub">
        Je zocht: <strong id="dl-confirm-wanted"></strong>
      </div>
      <div class="dl-confirm-hint">Kies het juiste album of annuleer:</div>
    </div>
    <div id="dl-confirm-cards" class="dl-confirm-cards"></div>
    <button id="dl-confirm-cancel" class="dl-confirm-cancel">Annuleren — zelf zoeken via Tidal tab</button>
  </div>
</div>

<script src="app.js" defer></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('[SW] Geregistreerd, scope:', reg.scope))
      .catch(err => console.warn('[SW] Registratie mislukt:', err));
  }
</script>
</body>
</html>

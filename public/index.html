<!DOCTYPE html>
<html lang="nl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muziek</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
</head>
<body>

<div class="app-shell">

  <!-- ═══════════════════════════════════════════
       SIDEBAR
  ═══════════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar" data-collapsed="false" aria-label="Hoofdnavigatie">

    <div class="sidebar-brand" aria-label="Muziek app">
      <span class="brand-icon" aria-hidden="true">🎵</span>
      <span class="brand-name">Muziek</span>
    </div>

    <nav class="sidebar-nav" aria-label="Navigatieonderdelen">

      <button class="nav-item active" data-view="bibliotheek" aria-label="Bibliotheek" aria-current="page">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="nav-label">Bibliotheek</span>
      </button>

      <button class="nav-item" data-view="ontdek" aria-label="Ontdek nieuwe muziek">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
        </svg>
        <span class="nav-label">Ontdek</span>
        <span class="nav-badge" id="badge-releases" style="display:none" aria-label="Nieuwe releases">0</span>
      </button>

      <button class="nav-item" data-view="gaps" aria-label="Ontbrekende albums (Gaps)">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <span class="nav-label">Gaps</span>
        <span class="nav-badge" id="badge-gaps" aria-label="Aantal gaps">?</span>
      </button>

      <button class="nav-item" data-view="downloads" aria-label="Downloads en download-queue">
        <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span class="nav-label">Downloads</span>
        <span class="nav-badge" id="badge-tidarr-queue" style="display:none" aria-label="Items in download-queue">0</span>
      </button>

    </nav>

    <div class="sidebar-divider" role="separator"></div>

    <!-- Plex afspeellijsten (dynamisch gevuld door JS) -->
    <div class="sidebar-section">
      <div class="sidebar-section-title" aria-label="Afspeellijsten sectie">Afspeellijsten</div>
      <div id="sidebar-playlists" role="list" aria-label="Plex afspeellijsten"></div>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-status" aria-label="Plex verbindingsstatus">
        <span class="status-dot" id="plex-dot" aria-hidden="true"></span>
        <span id="plex-status-text">Plex</span>
      </div>
      <div class="sidebar-status" aria-label="Tidarr verbindingsstatus">
        <span class="status-dot" id="tidarr-dot" aria-hidden="true"></span>
        <span id="tidarr-status-text">Tidarr</span>
      </div>
      <button class="sidebar-btn" id="theme-toggle" title="Wissel thema" aria-label="Wissel tussen licht en donker thema">☀️</button>
    </div>

  </aside>

  <!-- ═══════════════════════════════════════════
       MAIN AREA
  ═══════════════════════════════════════════ -->
  <main class="main-area" aria-label="Hoofdinhoud">

    <!-- Topbar -->
    <header class="topbar" id="topbar" aria-label="Topbalk">

      <button class="sidebar-toggle" id="sidebar-toggle"
              title="Zijbalk in-/uitklappen"
              aria-label="Zijbalk in- of uitklappen"
              aria-expanded="true"
              aria-controls="sidebar">☰</button>

      <div class="search-wrap" id="search-wrap" role="search" aria-label="Muziekzoekbalk">
        <input class="search-input" id="search-input" type="text"
               placeholder="Zoek artiest, album of nummer…"
               autocomplete="off"
               aria-label="Zoek artiest, album of nummer"
               aria-autocomplete="list"
               aria-haspopup="listbox">
        <div class="search-results" id="search-results" role="listbox" aria-label="Zoekresultaten"></div>
      </div>

      <div class="topbar-right">

        <div class="zone-picker" id="plex-zone-wrap" aria-label="Plex afspeelzone kiezer">
          <button class="zone-btn" id="plex-zone-btn"
                  title="Selecteer Plex afspeelzone"
                  aria-label="Selecteer Plex afspeelzone"
                  aria-haspopup="listbox"
                  aria-expanded="false">
            🔊 <span id="plex-zone-name">—</span>
          </button>
          <div class="zone-dropdown" id="plex-zone-dropdown"
               role="listbox"
               aria-label="Beschikbare afspeelzones"
               style="display:none"></div>
        </div>

        <label class="quality-select" title="Download kwaliteit" aria-label="Download kwaliteit kiezen">
          <select id="download-quality" aria-label="Selecteer download kwaliteit">
            <option value="max">Hi-Res</option>
            <option value="high" selected>FLAC</option>
            <option value="normal">AAC</option>
            <option value="low">96kbps</option>
          </select>
        </label>

      </div>
    </header>

    <!-- View-specifieke toolbar (dynamisch gevuld door JS per view) -->
    <div class="view-toolbar" id="view-toolbar" role="toolbar" aria-label="View opties"></div>

    <!-- Content area -->
    <div class="content-area" id="content" aria-live="polite" aria-label="Hoofdinhoud area">
      <div class="loading" role="status" aria-label="Laden">
        <div class="spinner" aria-hidden="true"></div>Laden…
      </div>
    </div>

    <!-- Tidarr iframe container (getoond/verborgen door JS) -->
    <div id="tidarr-ui-wrap" style="display:none; flex:1; overflow:hidden; min-height:0;" aria-label="Tidarr interface">
      <iframe
        id="tidarr-iframe"
        src=""
        data-src="/tidarr-ui/"
        style="width:100%; height:100%; border:none; min-height:600px;"
        allow="autoplay"
        title="Tidarr — volledige downloadinterface">
      </iframe>
    </div>

    <!-- Persistente player bar onderaan -->
    <div class="player-bar" id="player-bar" role="region" aria-label="Muziekspeler">

      <div class="player-track-info" aria-label="Huidige track informatie">
        <img class="player-art" id="player-art" src="" alt="Album art" aria-hidden="true">
        <div class="player-text">
          <div class="player-title" id="player-title" aria-label="Tracktitel">Niet aan het afspelen</div>
          <div class="player-artist" id="player-artist" aria-label="Artiest"></div>
        </div>
      </div>

      <div class="player-controls" role="group" aria-label="Afspeelopties">
        <button class="player-btn" id="player-prev" title="Vorige track" aria-label="Vorige track">⏮</button>
        <button class="player-btn player-btn-main" id="player-play" title="Play of pauzeer" aria-label="Play of pauzeer">▶</button>
        <button class="player-btn" id="player-next" title="Volgende track" aria-label="Volgende track">⏭</button>
      </div>

      <div class="player-progress-wrap" aria-label="Afspeelvoortgang">
        <span class="player-time" id="player-time-current" aria-label="Verstreken tijd">0:00</span>
        <div class="player-progress" id="player-progress"
             role="progressbar"
             aria-label="Afspeelbalk"
             aria-valuemin="0"
             aria-valuemax="100"
             aria-valuenow="0">
          <div class="player-progress-fill" id="player-progress-fill"></div>
        </div>
        <span class="player-time" id="player-time-total" aria-label="Totale duur">0:00</span>
      </div>

      <div class="player-extra" role="group" aria-label="Extra speleropties">
        <button class="player-btn" id="player-queue-btn" title="Bekijk afspeelwachtrij" aria-label="Bekijk afspeelwachtrij">☰</button>
        <input type="range" class="player-volume" id="player-volume"
               min="0" max="100" value="80"
               aria-label="Volume"
               title="Volume">
      </div>

    </div>

    <!-- Play Queue Panel -->
    <div class="play-queue-panel" id="play-queue-panel" role="region" aria-label="Afspeelwachtrij" style="display:none">
      <div class="pq-header">
        <span>Afspeelwachtrij</span>
        <button id="pq-close" class="pq-close" aria-label="Wachtrij sluiten" title="Sluiten">✕</button>
      </div>
      <ul class="pq-list" id="pq-list" role="list" aria-label="Nummers in wachtrij"></ul>
    </div>

  </main>
</div>

<!-- ═══════════════════════════════════════════
     Queue FAB + popover
═══════════════════════════════════════════ -->
<button id="queue-fab" style="display:none"
        title="Download queue openen"
        aria-label="Download queue openen"
        aria-haspopup="dialog">
  <span class="fab-icon" aria-hidden="true">⬇</span>
  <span class="fab-badge" id="fab-queue-badge" style="display:none" aria-label="Items in queue">0</span>
</button>

<div id="queue-popover" class="queue-popover" role="dialog" aria-label="Download queue" aria-modal="true">
  <div class="qpop-header">
    <span class="qpop-title-main">📥 Download queue</span>
    <button id="qpop-close" class="qpop-close" aria-label="Queue sluiten">✕</button>
  </div>
  <div id="queue-popover-list" class="qpop-list" role="list" aria-label="Queue items"></div>
  <div class="qpop-footer">
    <button id="qpop-goto-tidal" class="qpop-goto" aria-label="Ga naar downloads tab">Alles bekijken in Downloads →</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     Artiest detail panel
═══════════════════════════════════════════ -->
<div class="panel-overlay" id="panel-overlay" role="dialog" aria-label="Artiest detail" aria-modal="true">
  <div class="artist-panel" id="artist-panel">
    <button class="panel-close" id="panel-close" aria-label="Paneel sluiten">✕</button>
    <div id="panel-content">
      <div class="loading" role="status" aria-label="Laden">
        <div class="spinner" aria-hidden="true"></div>Laden…
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     Download bevestigingsdialog
═══════════════════════════════════════════ -->
<div id="dl-confirm-modal" class="dl-confirm-overlay" role="dialog" aria-label="Download bevestigen" aria-modal="true">
  <div class="dl-confirm-box">
    <div class="dl-confirm-header">
      <div class="dl-confirm-title">Verkeerde artiest gevonden</div>
      <div class="dl-confirm-sub">
        Je zocht: <strong id="dl-confirm-wanted"></strong>
      </div>
      <div class="dl-confirm-hint">Kies het juiste album of annuleer:</div>
    </div>
    <div id="dl-confirm-cards" class="dl-confirm-cards" role="list" aria-label="Albumkeuzes"></div>
    <button id="dl-confirm-cancel" class="dl-confirm-cancel" aria-label="Download annuleren">Annuleren — zelf zoeken via Downloads tab</button>
  </div>
</div>

<!-- Backward-compat verborgen spans die door bestaande JS worden gelezen -->
<span id="badge-wishlist" style="display:none" aria-hidden="true">0</span>
<span id="badge-discover" style="display:none" aria-hidden="true">✦</span>

<script type="module" src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('[SW] Geregistreerd, scope:', reg.scope))
      .catch(err => console.warn('[SW] Registratie mislukt:', err));
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Last.fm Muziekaanbevelingen</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 1.5rem; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #f0f0f0; }
    .track-card, .artist-card, .rec-card, .now-playing { background: #2a2a2a; border-color: #3a3a3a; }
    .user-header { background: #2a2a2a; }
    .tab { background: #2a2a2a; border-color: #444; color: #aaa; }
    .tab.active { background: #333; color: #f0f0f0; border-color: #666; }
    .stat-card { background: #2a2a2a; }
    .artist-avatar, .track-img-placeholder { background: #333; }
    .playcount-bar { background: #333; }
  }
  .app { max-width: 700px; margin: 0 auto; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
  .lastfm-badge { background: #d51007; color: white; font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 6px; }
  h2 { font-size: 20px; font-weight: 500; }
  .tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .tab { padding: 6px 14px; font-size: 14px; border: 0.5px solid #ccc; border-radius: 6px; cursor: pointer; background: white; color: #666; transition: all 0.15s; }
  .tab.active { background: #f0f0f0; color: #1a1a1a; border-color: #999; font-weight: 500; }
  .section-title { font-size: 13px; color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .track-list { display: flex; flex-direction: column; gap: 6px; }
  .track-card { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: white; border: 0.5px solid #e0e0e0; border-radius: 8px; }
  .track-img { width: 40px; height: 40px; border-radius: 4px; background: #eee; flex-shrink: 0; object-fit: cover; }
  .track-img-placeholder { width: 40px; height: 40px; border-radius: 4px; background: #eee; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .track-info { flex: 1; min-width: 0; }
  .track-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-artist { font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-meta { font-size: 12px; color: #aaa; flex-shrink: 0; }
  .playcount-bar { height: 3px; background: #eee; border-radius: 2px; margin-top: 4px; }
  .playcount-fill { height: 3px; background: #d51007; border-radius: 2px; }
  .artist-card { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: white; border: 0.5px solid #e0e0e0; border-radius: 8px; }
  .artist-avatar { width: 40px; height: 40px; border-radius: 50%; background: #eee; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; color: #666; }
  .rec-card { padding: 12px 14px; background: white; border: 0.5px solid #e0e0e0; border-radius: 8px; }
  .rec-card .rec-artist { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .rec-card .rec-reason { font-size: 13px; color: #888; }
  .user-header { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: #f0f0f0; border-radius: 12px; margin-bottom: 1.5rem; }
  .user-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
  .user-name { font-size: 16px; font-weight: 500; }
  .user-sub { font-size: 13px; color: #888; }
  .now-playing { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: white; border: 0.5px solid #d51007; border-radius: 8px; margin-bottom: 12px; }
  .np-dot { width: 8px; height: 8px; border-radius: 50%; background: #d51007; flex-shrink: 0; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .np-label { font-size: 11px; color: #d51007; font-weight: 500; flex-shrink: 0; }
  .error { color: #c00; font-size: 14px; padding: 12px; background: #fff0f0; border-radius: 8px; }
  .loading { color: #888; font-size: 14px; padding: 2rem; text-align: center; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="lastfm-badge">Last.fm</span>
    <h2>Muziekaanbevelingen</h2>
  </div>
  <div id="user-section"></div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('recent', this)">Recent</button>
    <button class="tab" onclick="showTab('topartists', this)">Top artiesten</button>
    <button class="tab" onclick="showTab('toptracks', this)">Top nummers</button>
    <button class="tab" onclick="showTab('recs', this)">Aanbevelingen</button>
  </div>
  <div id="content"><div class="loading">Laden...</div></div>
</div>

<script>
const USER = 'cjjansen13';
const API = 'https://ws.audioscrobbler.com/2.0/';
const KEY = '93d49bb56423f941a4b7a08778397670';
let cache = {};
let recData = { topArtists: [] };

async function lfm(method, extra = {}) {
  if (cache[method]) return cache[method];
  const params = new URLSearchParams({ method, user: USER, api_key: KEY, format: 'json', limit: 20, ...extra });
  const r = await fetch(`${API}?${params}`);
  const d = await r.json();
  cache[method] = d;
  return d;
}

async function lfm2(methodStr) {
  if (cache[methodStr]) return cache[methodStr];
  const r = await fetch(`${API}?${methodStr}&api_key=${KEY}&format=json`);
  const d = await r.json();
  cache[methodStr] = d;
  return d;
}

async function loadUser() {
  try {
    const d = await lfm('user.getinfo');
    const u = d.user;
    const plays = parseInt(u.playcount).toLocaleString('nl-NL');
    const img = u.image?.find(i => i.size === 'large')?.['#text'] || '';
    document.getElementById('user-section').innerHTML = `
      <div class="user-header">
        ${img ? `<img class="user-avatar" src="${img}" alt="">` : `<div class="user-avatar" style="display:flex;align-items:center;justify-content:center;font-size:20px;">♪</div>`}
        <div>
          <div class="user-name">${u.realname || u.name}</div>
          <div class="user-sub">${plays} scrobbles · lid sinds ${new Date(parseInt(u.registered?.unixtime)*1000).getFullYear()}</div>
        </div>
      </div>`;
  } catch(e) {}
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
}

function timeAgo(ts) {
  const diff = Math.floor(Date.now()/1000) - ts;
  if (diff < 120) return 'zojuist';
  if (diff < 3600) return `${Math.floor(diff/60)}m`;
  if (diff < 86400) return `${Math.floor(diff/3600)}u`;
  return `${Math.floor(diff/86400)}d`;
}

async function showRecent() {
  const d = await lfm('user.getrecenttracks', { limit: 15 });
  const tracks = d.recenttracks?.track || [];
  let html = '<div class="track-list">';
  for (const t of tracks) {
    const isNow = t['@attr']?.nowplaying;
    const img = t.image?.find(i => i.size === 'medium')?.['#text'] || '';
    const imgEl = img && !img.includes('2a96cbd8b46e442fc41c2b86b821562f')
      ? `<img class="track-img" src="${img}" alt="">`
      : `<div class="track-img-placeholder">♪</div>`;
    if (isNow) {
      html += `<div class="now-playing">${imgEl}<div class="np-dot"></div><div class="np-label">Nu</div><div class="track-info"><div class="track-name">${t.name}</div><div class="track-artist">${t.artist?.['#text']}</div></div></div>`;
    } else {
      const when = t.date?.uts ? timeAgo(parseInt(t.date.uts)) : '';
      html += `<div class="track-card">${imgEl}<div class="track-info"><div class="track-name">${t.name}</div><div class="track-artist">${t.artist?.['#text']}</div></div><div class="track-meta">${when}</div></div>`;
    }
  }
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

async function showTopArtists() {
  const d = await lfm('user.gettopartists');
  const artists = d.topartists?.artist || [];
  recData.topArtists = artists.slice(0, 5).map(a => a.name);
  const max = parseInt(artists[0]?.playcount || 1);
  let html = '<div class="section-title">Afgelopen periode</div><div class="track-list">';
  for (const a of artists) {
    const pct = Math.round(parseInt(a.playcount) / max * 100);
    const img = a.image?.find(i => i.size === 'medium')?.['#text'] || '';
    const hasImg = img && !img.includes('2a96cbd8b46e442fc41c2b86b821562f');
    html += `<div class="artist-card">
      ${hasImg ? `<img class="track-img" style="border-radius:50%" src="${img}" alt="">` : `<div class="artist-avatar">${initials(a.name)}</div>`}
      <div class="track-info"><div class="track-name">${a.name}</div><div class="playcount-bar"><div class="playcount-fill" style="width:${pct}%"></div></div></div>
      <div class="track-meta">${parseInt(a.playcount).toLocaleString('nl-NL')}</div>
    </div>`;
  }
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

async function showTopTracks() {
  const d = await lfm('user.gettoptracks');
  const tracks = d.toptracks?.track || [];
  const max = parseInt(tracks[0]?.playcount || 1);
  let html = '<div class="section-title">Meest gespeeld</div><div class="track-list">';
  for (const t of tracks) {
    const pct = Math.round(parseInt(t.playcount) / max * 100);
    const img = t.image?.find(i => i.size === 'medium')?.['#text'] || '';
    const hasImg = img && !img.includes('2a96cbd8b46e442fc41c2b86b821562f');
    html += `<div class="track-card">
      ${hasImg ? `<img class="track-img" src="${img}" alt="">` : `<div class="track-img-placeholder">♪</div>`}
      <div class="track-info"><div class="track-name">${t.name}</div><div class="track-artist">${t.artist?.name}</div><div class="playcount-bar"><div class="playcount-fill" style="width:${pct}%"></div></div></div>
      <div class="track-meta">${parseInt(t.playcount).toLocaleString('nl-NL')}×</div>
    </div>`;
  }
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

async function showRecs() {
  document.getElementById('content').innerHTML = '<div class="loading">Aanbevelingen ophalen op basis van jouw smaak...</div>';
  if (!recData.topArtists.length) {
    const d = await lfm('user.gettopartists');
    recData.topArtists = (d.topartists?.artist || []).slice(0, 5).map(a => a.name);
  }
  let recs = [];
  for (const artist of recData.topArtists.slice(0, 3)) {
    try {
      const d = await lfm2(`artist.getsimilar&artist=${encodeURIComponent(artist)}&limit=5`);
      const similar = d.similarartists?.artist || [];
      for (const s of similar) {
        if (!recData.topArtists.includes(s.name) && !recs.find(r => r.name === s.name)) {
          recs.push({ name: s.name, reason: artist, match: parseFloat(s.match) });
        }
      }
    } catch(e) {}
  }
  recs.sort((a,b) => b.match - a.match);
  recs = recs.slice(0, 12);
  if (!recs.length) {
    document.getElementById('content').innerHTML = '<div class="error">Geen aanbevelingen gevonden. Probeer het later opnieuw.</div>';
    return;
  }
  let html = '<div class="section-title">Vergelijkbaar met jouw smaak</div><div class="track-list">';
  for (const r of recs) {
    const pct = Math.round(r.match * 100);
    html += `<div class="rec-card">
      <div class="rec-artist">${r.name}</div>
      <div class="rec-reason">Vergelijkbaar met ${r.reason} · ${pct}% match</div>
    </div>`;
  }
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function showTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const map = { recent: showRecent, topartists: showTopArtists, toptracks: showTopTracks, recs: showRecs };
  map[tab]();
}

loadUser();
showRecent();
</script>
</body>
</html>
